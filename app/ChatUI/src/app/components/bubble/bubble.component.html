<div class="d-flex flex-column">
    <div class="d-flex flex-row" *ngIf="bubble.isResponse()">
        <img src="{{bubble.getModel()!.avatar}}" width="28px" height="28px" style="border-radius: 12px; filter: none !important"
            draggable="false" />
        <p class="d-inline" style="margin-block: auto; opacity: 0.6"> &nbsp;&nbsp;{{bubble.getModel()!.name.split(' ')[0]}}</p>
    </div>

    <div [ngClass]="{ prompt: !bubble.isResponse() }" class="my-3" style="max-width: 80%; width: fit-content; border-radius: 24px;">
        <p class="m-0 px-1" style="overflow-wrap: break-word; padding-block: 2px">{{bubble.getMessage()}}</p>
    </div>
</div>
<style>
    .prompt {
        margin-left: auto;
        border-radius: 10px;
        background-color: var(--bg-body-secondary);
        padding: 0.5rem 1rem;
    }
</style>
